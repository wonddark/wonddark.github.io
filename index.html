<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Osmanys Fuentes Lombá</title>
</head>
<style>
	body {
		padding: unset;
		margin: unset;
	}

	header {
		background: url('/public/images/ian-c--6Jr5umdjyE-unsplash.webp') center;
		background-size: cover;
		color: #efefef;
		position: relative;
		height: 100vh;
	}

	.header-nav {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 17px 9px;
	}

	@media (max-width: 480px) {
		.header-nav {
			flex-flow: column;
			justify-content: start;
			align-items: center;
			gap: 7px
		}
	}

	.header-nav a {
		color: white;
		text-decoration: none;
		font-size: 1.3rem;
	}

	.header-nav ul {
		list-style: none;
		display: flex;
		gap: 7px;
		padding: 0;
		margin: 0
	}

	.header-nav li {
		padding: 3px 9px;
		border: 1px solid #4f4f4f;
		border-radius: 2px;
		cursor: pointer;
		transition: all ease-in-out .5s;
	}

	.header-nav  a {
		font-size: unset;
	}

	.header-nav li:hover {
		background: #dcdcdc;
		color: #1b1f31;
	}

	button {
		border: none;
		background: transparent;
		padding: unset;
		margin: unset;
		outline: unset;
		cursor: pointer;
	}

	.home-main {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 7px;
		position: absolute;
		bottom: 15vh;
		left: 0;
		right: 0;
	}

	.home-main button {
		padding: 11px 15px;
		font-size: 1rem;
		border-radius: 5px;
		transition: all ease-in-out .5s;
	}

	.home-main button:hover {
		filter: brightness(1.1);
	}

	.home-main-cta {
		background: #f9a72b;
	}

	.home-sec-cta {
		background: #dcdcdc;
	}
</style>
<body>
<header>
	<div class="header-nav">
		<a href="/">Osmanys Fuentes Lombá</a>
		<nav>
			<ul>
				<li><a href="/projects">Projects</a></li>
				<li>About</li>
				<li>Contact</li>
			</ul>
		</nav>
	</div>
	<div class="home-main">
		<button class="home-main-cta">Get in touch</button>
		<button class="home-sec-cta">Take the tour</button>
	</div>
</header>
</body>
</html>
